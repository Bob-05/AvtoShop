<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | AvtoShop Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-login-page">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <h1>AvtoShop</h1>
            <h2>Вход в админ-панель</h2>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@avtoshop.ru" required>
                </div>
                
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                
                <div id="loginError" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            
            <a href="../index.html" class="back-link">← Вернуться на сайт</a>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
