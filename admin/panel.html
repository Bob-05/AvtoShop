<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | AvtoShop</title>
    
    <link rel="preconnect" href="http://localhost:5000">
    <link rel="dns-prefetch" href="http://localhost:5000">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-panel-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>AvtoShop</h2>
                <p>Админ-панель</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="services">
                    <span class="icon">🔧</span>
                    <span>Услуги</span>
                </a>
                <a href="#" class="nav-item" data-tab="reviews">
                    <span class="icon">⭐</span>
                    <span>Отзывы</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="admin-info">
                    <span id="adminEmailDisplay">admin@avtoshop.ru</span>
                </div>
                <button id="logoutBtn" class="btn-logout">Выйти</button>
                <a href="../index.html" class="back-to-site">← На сайт</a>
            </div>
        </aside>
        
        <main class="admin-main">
            <div id="servicesTab" class="tab-content active">
                <div class="page-header">
                    <h1>Управление услугами</h1>
                    <button id="openAddServiceModal" class="btn-primary">+ Добавить услугу</button>
                </div>
                <div class="services-list" id="adminServicesList">
                    <div class="loading">Загрузка услуг...</div>
                </div>
            </div>
            
            <div id="reviewsTab" class="tab-content">
                <div class="page-header">
                    <h1>Управление отзывами</h1>
                </div>
                <div class="reviews-list" id="adminReviewsList">
                    <div class="loading">Загрузка отзывов...</div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeServiceModal">&times;</span>
            <h2 id="modalTitle">Добавить услугу</h2>
            
            <form id="serviceForm">
                <input type="hidden" id="serviceId">
                
                <div class="form-group">
                    <label>Название услуги</label>
                    <input type="text" id="serviceName" placeholder="Например: Замена масла" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="serviceDesc" rows="3" placeholder="Подробное описание услуги" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Цена</label>
                    <input type="text" id="servicePrice" placeholder="Например: от 500 ₽" required>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelServiceModal">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="confirmModal" class="modal">
        <div class="modal-content modal-small">
            <h3>Подтверждение</h3>
            <p id="confirmMessage">Вы уверены, что хотите удалить?</p>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="cancelConfirm">Отмена</button>
                <button type="button" class="btn-danger" id="confirmDelete">Удалить</button>
            </div>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
